services:
  mistral-ocr-local:
    build: .
    container_name: mistral-ocr-local
    ports:
      - "8089:8089"
    environment:
      OCR_MODEL_NAME: mistral-ocr-latest
      TESSERACT_LANG: eng
      OCR_TEXT_THRESHOLD: "50"
      FILE_TTL_SECONDS: "604800"
      DEFAULT_VISIBILITY: "workspace"
      PUBLIC_BASE_URL: "http://127.0.0.1:8089"
    volumes:
      - ./data:/data
    restart: unless-stopped
